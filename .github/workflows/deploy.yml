name: Deploy to cPanel (FTP - Active Mode)

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Sync via Active FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASS }}
          port: 21
          passive: false 
          protocol: ftp 
          secure: false
          local-dir: ./
          server-dir: ./ 
          
          exclude: |
            **/node_modules/**
            **/vendor/**
            **/.git*
            **/.github/**
            **/__pycache__/**
            **/venv/**
            **/.env
            **/.env.*
            **/tests/**
            **/storage/*.sqlite
